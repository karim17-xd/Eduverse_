<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduVerse - Join Us</title>
    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/fonts.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        .input-error {
            border: 1.5px solid var(--error) !important;
            box-shadow: 0 0 8px rgba(255, 77, 77, 0.1);
        }

        .error-text {
            color: var(--error);
            font-size: 0.7rem;
            margin-top: 4px;
            display: none;
            /* masfeya f el awal */
            text-align: left;
            width: 100%;
        }

        /* 3shan el row bta3 el name maybozsh lma el error yzhar */
        .input-box {
            margin-bottom: 15px !important;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .row .input-box {
            flex: 1;
        }
    </style>
</head>

<body>
    <main class="main-container">
        <section class="hero-section">
            <div class="status-badge">
                <span class="dot"></span> WELCOME TO EDUVERSE
            </div>
            <h1>EduVerse<span>.</span><br>University</h1>
            <p class="description">
                Elevating your academic journey through innovation. Join the next generation of software engineers.
            </p>

            <div class="social-links">
                <button id="ChangeTheme"> Change Theme ? </button>
                <div class="icons">
                    <a href="https://github.com/karimxd313-bit" target="_blank"><i class="ri-github-fill"></i></a>
                    <a href="https://www.linkedin.com/in/karim-ezzat" target="_blank"><i
                            class="ri-linkedin-box-fill"></i></a>
                    <a href="https://x.com/karimezzat55671" target="_blank"><i class="ri-twitter-x-fill"></i></a>
                </div>
            </div>
        </section>

        <section class="form-section">
            <div class="content">
                <form id="signupForm" onsubmit="event.preventDefault(); signup();">
                    <h2>Create Account</h2>

                    <div class="row" style="display: flex; gap: 10px; width: 100%;">
                        <div class="input-box">
                            <input type="text" id="firstName" class="form-input" placeholder="First Name" required />
                            <span class="error-text" id="firstName-error">Required!</span>
                        </div>
                        <div class="input-box">
                            <input type="text" id="lastName" class="form-input" placeholder="Last Name" required />
                            <span class="error-text" id="lastName-error">Required!</span>
                        </div>
                    </div>

                    <div class="input-box">
                        <div style="position: relative; width: 100%;">
                            <input type="text" id="signupUsername" class="form-input" placeholder="Username" required />
                            <i class="ri-user-3-line"></i>
                        </div>
                        <span class="error-text" id="signupUsername-error">Please choose a username</span>
                    </div>

                    <div class="input-box">
                        <div style="position: relative; width: 100%;">
                            <input type="email" id="universityEmail" class="form-input" placeholder="University Email"
                                required />
                            <i class="ri-mail-line"></i>
                        </div>
                        <span class="error-text" id="universityEmail-error">University email is required</span>
                    </div>

                    <div class="input-box">
                        <div style="position: relative; width: 100%;">
                            <input type="password" id="signupPassword" class="form-input" placeholder="Password"
                                required />
                            <i class="ri-eye-off-line" onclick="togglePass('signupPassword', this)"
                                style="cursor: pointer;"></i>
                        </div>
                        <span class="error-text" id="signupPassword-error">Password cannot be empty</span>
                    </div>

                    <button type="submit" class="btnn">Create Account </button>
                    <p class="footer-text">Already have an account? <a href="./login.html">Log in</a></p>
                    <p id="message" style="text-align: center; margin-top: 10px;"></p>
                </form>
            </div>
        </section>
    </main>

    <script src="../../js/main.js"></script>
    <script src="../../js/theme.js"></script>
    <script src="../../js/auth.js"></script>
</body>

</html>
